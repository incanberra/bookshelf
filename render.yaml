services:
  - type: web
    name: home-library-manager
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_PATH
        value: /var/data/library.db
      - key: WEB_CONCURRENCY
        value: "1"
    disk:
      name: library-data
      mountPath: /var/data
      sizeGB: 1

